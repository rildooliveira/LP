<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        header {
            background-color: #007bff;
            color: white;
            padding: 1rem 0;
            text-align: center;
        }
        
        nav {
            background-color: #0056b3;
            padding: 0.5rem;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 1rem;
            display: inline-block;
        }
        
        nav a:hover {
            background-color: #003d82;
            padding: 0.5rem;
        }
        
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        section {
            margin-bottom: 2rem;
        }
        
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Bem-vindo ao Meu Site</h1>
    </header>
    
    <nav>
        <a href="#home">Home</a>
        <a href="#sobre">Sobre</a>
        <a href="#servicos">Serviços</a>
        <a href="#contato">Contato</a>
    </nav>
    
    <main>
        <section id="home">
            <h2>Home</h2>
            <p>Conteúdo da página inicial.</p>
        </section>
        
        <section id="sobre">
            <h2>Sobre</h2>
            <p>Informações sobre o site e seus objetivos.</p>
        </section>
        
        <section id="servicos">
            <h2>Serviços</h2>
            <p>Descrição dos serviços oferecidos.</p>
        </section>
        
        <section id="contato">
            <h2>Contato</h2>
            <p>Entre em contato conosco.</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2024 Meu Site. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
