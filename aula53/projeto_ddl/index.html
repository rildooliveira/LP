<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Estrutura - Aula 52</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="https://cdn-icons-png.flaticon.com/512/2370/2370264.png"
             alt="DDL Logo" width="50">
            <h2>Arquiteto de Tabelas (DDL)</h2>
        </div>
        
        <div id="status-container" class="status-box standby">
            <p id="mensagem">Pronto para criar estrutura...</p>
        </div>

        <button id="btn-criar-tabela" class="btn-ddl">Criar Tabela 'Produtos'</button>
        
        <div class="info">
            <small>Comando: <strong>CREATE TABLE</strong> | Motor: <strong>InnoDB</strong></small>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
