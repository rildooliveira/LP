<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vínculos de Dados (FK) - Aula 55</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="https://cdn-icons-png.flaticon.com/512/2370/2370150.png" alt="FK Logo" width="50">
            <h2>Cadastro com Vínculo (FK)</h2>
        </div>
        
        <div class="form-group">
            <input type="text" id="nome-produto" placeholder="Nome do Produto">
            
            <select id="select-categoria">
                <option value="">Selecione uma Categoria...</option>
                <option value="1">Hardware (ID: 1)</option>
                <option value="2">Periféricos (ID: 2)</option>
                <option value="3">Software (ID: 3)</option>
            </select>
        </div>

        <div id="status-container" class="status-box standby">
            <p id="mensagem">Aguardando definição de vínculo...</p>
        </div>

        <button id="btn-vincular">Salvar com Relacionamento</button>
        
        <div class="info">
            <small>Restrição: <strong>FOREIGN KEY</strong> | Ação: <strong>RESTRICT</strong></small>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
