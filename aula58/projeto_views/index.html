<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Relatórios com Views - Aula 58</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card wide">
        <div class="header">
            <img src="https://cdn-icons-png.flaticon.com/512/3595/3595493.png" alt="View Logo" width="50">
            <h2>Relatório via Tabela Virtual (VIEW)</h2>
        </div>

        <button id="btn-carregar-view">Solicitar Dados da View</button>

        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Categoria</th>
                    <th>Preço</th>
                </tr>
            </thead>
            <tbody id="corpo-view"></tbody>
        </table>

        <div id="status-container" class="status-box standby">
            <p id="mensagem">Aguardando chamada da View segura...</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
