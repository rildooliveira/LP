<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laboratório de Performance - Aula 59</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card wide">
        <div class="header">
            <img src="https://cdn-icons-png.flaticon.com/512/1541/1541415.png" alt="Speed Logo" width="50">
            <h2>Monitor de Otimização (EXPLAIN)</h2>
        </div>
        
        <div class="test-area">
            <select id="tipo-teste" class="input-padrao">
                <option value="base">Busca Exata por Nome (Atv 1 a 3)</option>
                <option value="atv4">Filtro de Preço Maior Que (Atv 4)</option>
                <option value="atv5_prefixo">Busca LIKE com Prefixo (Atv 5)</option>
                <option value="atv5_sufixo">Busca LIKE com Sufixo (Atv 5)</option>
                <option value="atv6">Teste de JOIN com FK (Atv 6)</option>
                <option value="atv7">Índice Composto Cat + Preço (Atv 7)</option>
                <option value="atv8">Index Only Scan (Atv 8)</option>
                <option value="atv9">Baixa Cardinalidade Ativo=0/1 (Atv 9)</option>
            </select>
        </div>

        <div class="test-area">
            <input type="text" id="valor-busca" class="input-padrao" placeholder="Digite o valor (nome, preço, 1 ou 0)...">
            <button id="btn-testar">Executar Auditoria</button>
        </div>

        <div class="results-container">
            <div class="result-box">
                <small>Tempo de Execução:</small>
                <h3 id="tempo-sql">0.0000s</h3>
            </div>
            <div class="result-box">
                <small>Linhas Analisadas (Rows):</small>
                <h3 id="linhas-analisadas">0</h3>
            </div>
            <div class="result-box">
                <small>Tipo de Busca (Type):</small>
                <h3 id="tipo-busca">---</h3>
            </div>
        </div>

        <div id="status-container" class="status-box standby">
            <p id="mensagem">Aguardando gatilho de busca...</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
