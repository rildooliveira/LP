<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestres da Invenção - Debugging</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="cabecalho">
        <h1>Mestres da Invenção</h1>
        <p>Laboratório de Caça aos Bugs</p>
    </header>

    <main class="container">
        <div class="layout-duplo">
            <aside class="painel-cadastro">
                <h2>Nova Invenção</h2>
                <form id="form-invencao">
                    <label for="nome">Nome do Projeto:</label>
                    <input type="text" id="nome" name="nome_projeto" required>

                    <label for="categoria">Categoria:</label>
                    <select id="categoria" name="categoria" required>
                        <option value="">Selecione...</option>
                        <option value="Mobilidade">Mobilidade</option>
                        <option value="Energia">Energia</option>
                        <option value="Equipamento">Equipamento</option>
                    </select>

                    <label for="custo">Custo Estimado (R$):</label>
                    <input type="number" id="custo" name="custo_estimado" step="0.01" required>

                    <button type="submit" id="btn-salvar">Cadastrar Carta</button>
                    <div id="mensagem-form"></div>
                </form>
            </aside>

            <section class="painel-leitura">
                <h2>Acervo de Invenções</h2>
                <div id="lista-invencoes" class="grid-cards">
                    <p class="carregando">Conectando ao banco de dados...</p>
                </div>
            </section>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
