<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestres da Invenção - Gestor Administrativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="cabecalho">
        <div class="container-header">
            <h1>Mestres da Invenção</h1>
            <p>Painel de Controle de Projetos e Cartas</p>
        </div>
    </header>

    <main class="container">
        <div class="layout-duplo">
            
            <aside class="painel-cadastro">
                <h2>Nova Invenção</h2>
                <form id="form-invencao">
                    <div class="grupo-input">
                        <label for="nome">Nome do Projeto:</label>
                        <input type="text" id="nome" name="nome_projeto" placeholder="Ex: Motor Magnético" required>
                    </div>
                    
                    <div class="grupo-input">
                        <label for="categoria">Categoria Estratégica:</label>
                        <select id="categoria" name="categoria" required>
                            <option value="">Selecione uma categoria...</option>
                            <option value="Mobilidade">Mobilidade</option>
                            <option value="Energia">Energia</option>
                            <option value="Equipamento">Equipamento</option>
                            <option value="Software">Software</option>
                        </select>
                    </div>
                    
                    <div class="grupo-input">
                        <label for="custo">Custo Estimado (R$):</label>
                        <input type="number" id="custo" name="custo_estimado" step="0.01" placeholder="0.00" required>
                    </div>
                    
                    <button type="submit" id="btn-salvar">Cadastrar no Acervo</button>
                    <div id="mensagem-form" class="mensagem-oculta"></div>
                </form>
            </aside>

            <section class="painel-leitura">
                <div class="cabecalho-leitura">
                    <h2>Acervo de Projetos</h2>
                    <span id="contador-projetos" class="badge-contador">0 Projetos</span>
                </div>
                
                <div id="lista-invencoes" class="grid-cards">
                    <p class="carregando">Sincronizando com o servidor...</p>
                </div>
            </section>

        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
